packages:
  - '**'
  - '!**/test/**'
  - '!resolve-link-target/node_modules_link/**'
allowBuilds:
  '@pnpm/exe': true
  bun: true
  core-js: false
  yarn: true

configDependencies:
  '@pnpm/plugin-better-defaults': 0.2.1

ignoredBuiltDependencies:
  - core-js

onlyBuiltDependencies:
  - '@pnpm/exe'
  - bun
  - yarn

overrides:
  '@types/node': 14.14.6
